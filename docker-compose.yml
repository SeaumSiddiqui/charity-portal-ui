version: '3.8'

services:
  # Development environment
  qc-frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV: development
    container_name: qc-frontend-dev
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    profiles:
      - dev

  # Production environment
  qc-frontend-prod:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV: production
    container_name: qc-frontend-prod
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    profiles:
      - prod
